<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Verdex Miner Authentication</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <style>
    body {
      background: #050a05;
      color: #f0fdf4;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      background: #0c1a0e;
      border: 1px solid #153018;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .icon {
      font-size: 60px;
      color: #22c55e;
      animation: pulse 1.5s infinite;
      margin-bottom: 20px;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
    }
    p {
      color: #86a389;
      font-size: 14px;
      margin: 0 0 20px 0;
      line-height: 1.5;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">⚡</div>
    <h2 id="title">Authenticating</h2>
    <p id="status">Connecting to secure authentication gateway...</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://unbzescopxtmtbrgqlhh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuYnplc2NvcHh0bXRicmdxbGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1Njc1MjcsImV4cCI6MjA5OTE0MzUyN30.jHm7uIV_fBWIP-EFl3d2AY5P42X3tcIIbEGwNfSYiPM';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    async function handleAuth() {
      const urlParams = new URLSearchParams(window.location.search);
      const port = urlParams.get('port');
      
      if (port) {
        // Save the port in localStorage so it persists across redirects
        localStorage.setItem('desktop_port', port);
        
        document.getElementById('status').textContent = 'Initiating Google Sign-In...';
        
        // Start Google OAuth flow with state cookie initialized
        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/auth-desktop.html'
          }
        });
        
        if (error) {
          document.getElementById('icon').textContent = '❌';
          document.getElementById('title').textContent = 'Failed';
          document.getElementById('status').textContent = error.message;
        }
      } else {
        // Check if we are returning from OAuth redirect with access token
        document.getElementById('status').textContent = 'Checking session...';
        
        const { data: { session }, error } = await supabase.auth.getSession();
        
        if (session) {
          const savedPort = localStorage.getItem('desktop_port') || '8420';
          localStorage.removeItem('desktop_port');
          
          document.getElementById('icon').textContent = '✅';
          document.getElementById('title').textContent = 'Authorized';
          document.getElementById('status').textContent = 'Redirecting back to Verdex Miner app...';
          
          // Redirect browser to local desktop server
          window.location.replace('http://127.0.0.1:' + savedPort + '/callback?access_token=' + encodeURIComponent(session.access_token) + '&refresh_token=' + encodeURIComponent(session.refresh_token));
        } else {
          document.getElementById('icon').textContent = '⚠️';
          document.getElementById('title').textContent = 'No Session';
          document.getElementById('status').textContent = 'No active session found. Please try opening the login from the app again.';
        }
      }
    }

    handleAuth().catch(err => {
      document.getElementById('icon').textContent = '❌';
      document.getElementById('title').textContent = 'Error';
      document.getElementById('status').textContent = err.message || err;
    });
  </script>
</body>
</html>
